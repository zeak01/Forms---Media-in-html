<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Document</title>
</head>
<body>
        <!-- Advanced Form Structure -->
     <form action="" class="form-container">
        <!-- Test -->
         <div class="form-text">
            <h2>Registration</h2>
            <p>Welcome to Gooddeeds Empowerment Foundation. Get Started</p>
         </div>
         <!-- Input Started -->
        <div class="input-container">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" name="name" placeholder="Enter Name" required id="">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" name="email" placeholder="Enter Email" required id="">
        </div>
        <div class="form-group">
            <label for="phone number">Phone Number</label>
            <input type="digit" name="phone number" placeholder="Enter Phone Number" required id="">
            </div>
        <div class="form-group">
            <label for="password">Password</label>  
            <input type="password" name="password" placeholder="Enter Password" required id="">
        </div>
       </div>
       <!-- Buttons/ -->
        <button type="submit" class="submit-btn">Submit Form</button>
     </form>
</body>
</html>
